<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gua Tempurung — Staff login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600&family=Spectral:ital,wght@0,300;0,400;0,500;0,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/base.css">
</head>
<body>
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div style="width:100%;max-width:420px;background:#fbfaf6;border:1px solid #e3ddcd;border-radius:22px;padding:40px 36px;box-shadow:0 30px 60px -34px rgba(22,38,27,.5);">

      <div style="display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:28px;">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" style="margin-bottom:14px;"><path d="M12 22C12 22 4 16 4 9.5C4 6 7 3 12 3C17 3 20 6 20 9.5C20 16 12 22 12 22Z" fill="#2f4a32"/><path d="M12 21V8M12 13C9.5 13 8 11 8 9M12 16C14.5 16 16 14 16 12" stroke="#e7e2d4" stroke-width="1.4" stroke-linecap="round"/></svg>
        <div style="font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#8a6d4f;margin-bottom:8px;">Gua Tempurung · Basecamp OS</div>
        <h1 style="font-family:'Newsreader',serif;font-weight:500;font-size:30px;line-height:1.05;margin:0;color:#1f3326;">Staff login</h1>
        <p style="font-size:14px;color:#6b6553;margin:8px 0 0;">Sign in to manage bookings and the gate.</p>
      </div>

      <form id="loginForm" novalidate style="display:flex;flex-direction:column;gap:16px;">
        <label style="display:block;">
          <span style="display:block;font-size:13px;color:#6b6553;margin-bottom:6px;">Email</span>
          <input id="email" type="email" autocomplete="username" placeholder="you@guatempurung.co" class="inp" style="width:100%;border:1px solid #ddd6c5;border-radius:11px;padding:13px 15px;background:#fff;font-size:15px;color:#23291f;">
        </label>
        <label style="display:block;">
          <span style="display:block;font-size:13px;color:#6b6553;margin-bottom:6px;">Password</span>
          <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" class="inp" style="width:100%;border:1px solid #ddd6c5;border-radius:11px;padding:13px 15px;background:#fff;font-size:15px;color:#23291f;">
        </label>

        <div id="error" hidden style="display:flex;align-items:center;gap:8px;background:rgba(168,85,46,.12);border:1px solid rgba(191,107,58,.35);border-radius:11px;padding:11px 14px;font-size:13.5px;color:#8a3322;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M12 8v5M12 16h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span id="errorText">Incorrect email or password.</span>
        </div>

        <button type="submit" class="btn-green" style="width:100%;background:#2f4a32;color:#f4f1ea;font-size:16px;font-weight:500;padding:15px;border-radius:12px;margin-top:4px;">Log in</button>
      </form>

      <div style="text-align:center;margin-top:22px;">
        <a href="../index.html" style="display:inline-flex;align-items:center;gap:7px;font-size:14px;color:#2f4a32;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M11 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Back to site
        </a>
      </div>
    </div>
  </div>

  <script>
    // Front-end-only gate (no backend) — credentials are hardcoded and readable in source.
    (function () {
      var VALID_EMAIL = 'admin@gmail.com';
      var VALID_PASS = 'admin123';
      var form = document.getElementById('loginForm');
      var err = document.getElementById('error');
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var email = document.getElementById('email').value.trim().toLowerCase();
        var pass = document.getElementById('password').value;
        if (email === VALID_EMAIL && pass === VALID_PASS) {
          sessionStorage.setItem('gt_auth', '1');
          window.location.href = '../admin/';
        } else {
          err.hidden = false;
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      });
    })();
  </script>
</body>
</html>
